<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>乐东英歌海扭王块吊装软件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
        }
        
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 标题 */
        .title {
            text-align: center;
            font-size: 16px;
            color: #FFD700;
            letter-spacing: 2px;
            padding: 10px 0;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        /* 模式选择按钮 */
        .mode-switch {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            color: #888;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mode-btn.active {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
        }
        
        /* 吊钩垂直距离 */
        .height-section {
            text-align: center;
            padding: 15px;
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 12px;
        }
        
        .section-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .height-input {
            width: 120px;
            font-size: 36px;
            font-weight: bold;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 8px 15px;
            text-align: center;
            outline: none;
            font-family: inherit;
        }
        
        .height-input:focus {
            border-color: rgba(255, 215, 0, 0.6);
        }
        
        .unit {
            font-size: 18px;
            color: #666;
            margin-left: 8px;
        }
        
        /* 手动模式 - 滑块 */
        .manual-mode {
            text-align: center;
            padding: 20px;
            background: rgba(255, 150, 0, 0.05);
            border: 1px solid rgba(255, 150, 0, 0.15);
            border-radius: 12px;
        }
        
        .slider-container {
            margin: 15px 0;
        }
        
        .slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: rgba(255, 150, 0, 0.2);
            border-radius: 4px;
            outline: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #FF9633;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 150, 0, 0.5);
        }
        
        .angle-display {
            font-size: 72px;
            font-weight: bold;
            color: #FF9633;
            text-shadow: 0 0 20px rgba(255, 150, 0, 0.5);
            line-height: 1;
        }
        
        .angle-input {
            width: 100px;
            font-size: 28px;
            color: #FF9633;
            background: rgba(255, 150, 0, 0.1);
            border: 1px solid rgba(255, 150, 0, 0.3);
            border-radius: 8px;
            padding: 6px 12px;
            text-align: center;
            outline: none;
            margin-top: 10px;
        }
        
        /* 罗盘模式 */
        .compass-mode {
            text-align: center;
            padding: 15px;
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 12px;
        }
        
        .compass-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .compass {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(20, 20, 40, 0.9);
            border: 3px solid #FFD700;
            box-shadow: 
                0 0 15px rgba(255, 215, 0, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        /* 刻度线 */
        .compass::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 170px;
            height: 170px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: 
                conic-gradient(
                    from 0deg,
                    transparent 0deg, #FFD700 0deg, #FFD700 2deg, transparent 2deg,
                    transparent 28deg, #FFD700 30deg, #FFD700 32deg, transparent 32deg,
                    transparent 58deg, #FFD700 60deg, #FFD700 62deg, transparent 62deg,
                    transparent 88deg, #FFD700 90deg, #FFD700 92deg, transparent 92deg,
                    transparent 118deg, #FFD700 120deg, #FFD700 122deg, transparent 122deg,
                    transparent 148deg, #FFD700 150deg, #FFD700 152deg, transparent 152deg,
                    transparent 178deg, #FFD700 180deg, #FFD700 182deg, transparent 182deg,
                    transparent 208deg, #FFD700 210deg, #FFD700 212deg, transparent 212deg,
                    transparent 238deg, #FFD700 240deg, #FFD700 242deg, transparent 242deg,
                    transparent 268deg, #FFD700 270deg, #FFD700 272deg, transparent 272deg,
                    transparent 298deg, #FFD700 300deg, #FFD700 302deg, transparent 302deg,
                    transparent 328deg, #FFD700 330deg, #FFD700 332deg, transparent 332deg,
                    transparent 358deg, #FFD700 360deg
                );
            background-size: 100% 100%;
            background-position: center;
        }
        
        /* 小刻度 */
        .compass-ticks {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            transform: translate(-50%, -50%);
        }
        
        .compass-tick {
            position: absolute;
            width: 2px;
            height: 6px;
            background: rgba(255, 215, 0, 0.5);
            top: 0;
            left: 50%;
            transform-origin: center 80px;
        }
        
        /* 方向字母 */
        .compass-direction {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }
        
        .compass-n { top: 10px; left: 50%; transform: translateX(-50%); }
        .compass-e { right: 10px; top: 50%; transform: translateY(-50%); }
        .compass-s { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .compass-w { left: 10px; top: 50%; transform: translateY(-50%); }
        
        /* 红色指针 */
        .compass-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 70px;
            transform-origin: center bottom;
            transform: translate(-50%, -100%);
            transition: transform 0.15s ease-out;
        }
        
        .compass-needle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 35px solid #FF4444;
            filter: drop-shadow(0 0 5px #FF4444);
        }
        
        .compass-needle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 35px solid rgba(100, 100, 100, 0.8);
        }
        
        /* 中心圆点 */
        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            z-index: 10;
        }
        
        .reset-btn {
            margin-top: 10px;
            padding: 8px 20px;
            font-size: 12px;
            color: #888;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
        }
        
        /* 计算结果区域 */
        .result-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 12px;
        }
        
        .result-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .result-value {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 
                0 0 10px #FFD700,
                0 0 20px #FFD700,
                0 0 40px #FFD700;
            line-height: 1.2;
        }
        
        .result-value.bounce {
            animation: bounce 0.15s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .result-unit {
            font-size: 20px;
            color: #666;
            margin-left: 5px;
        }
        
        /* 安全判定 */
        .safety-section {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }
        
        .safety-status {
            font-size: 32px;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .safety-status.safe {
            color: #00FF88;
            text-shadow: 
                0 0 10px #00FF88,
                0 0 20px #00FF88,
                0 0 40px #00FF88;
        }
        
        .safety-status.danger {
            color: #FF4444;
            text-shadow: 
                0 0 10px #FF4444,
                0 0 20px #FF4444;
        }
        
        /* 最大安全偏角 */
        .max-angle {
            text-align: center;
            font-size: 13px;
            color: #555;
            padding: 8px;
        }
        
        /* 隐藏模式 */
        .mode-content {
            display: none;
        }
        
        .mode-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">乐东英歌海扭王块吊装软件</div>
        
        <!-- 模式切换 -->
        <div class="mode-switch">
            <button class="mode-btn active" id="manualModeBtn" onclick="switchMode('manual')">手动模式</button>
            <button class="mode-btn" id="compassModeBtn" onclick="switchMode('compass')">罗盘模式</button>
        </div>
        
        <!-- 吊钩垂直距离 -->
        <div class="height-section">
            <div class="section-label">① 吊钩垂直距离</div>
            <div>
                <input type="number" class="height-input" id="heightInput" value="20" min="0.1" step="0.1">
                <span class="unit">米</span>
            </div>
        </div>
        
        <!-- 手动模式 -->
        <div class="mode-content active" id="manualContent">
            <div class="manual-mode">
                <div class="section-label">偏角</div>
                <div class="slider-container">
                    <input type="range" class="slider" id="angleSlider" min="0" max="45" step="0.1" value="0">
                </div>
                <div class="angle-display" id="angleDisplay">0.0°</div>
                <input type="number" class="angle-input" id="angleInput" placeholder="直接输入" step="0.1" value="0">
            </div>
        </div>
        
        <!-- 罗盘模式 -->
        <div class="mode-content" id="compassContent">
            <div class="compass-mode">
                <div class="section-label">偏角</div>
                <div class="compass-container">
                    <div class="compass" id="compass">
                        <div class="compass-ticks" id="compassTicks"></div>
                        <span class="compass-direction compass-n">N</span>
                        <span class="compass-direction compass-e">E</span>
                        <span class="compass-direction compass-s">S</span>
                        <span class="compass-direction compass-w">W</span>
                        <div class="compass-needle" id="compassNeedle"></div>
                        <div class="compass-center"></div>
                    </div>
                </div>
                <button class="reset-btn" id="resetBtn">归零</button>
            </div>
        </div>
        
        <!-- ② 伸长偏差 -->
        <div class="result-card">
            <div class="result-label">② 伸长偏差</div>
            <div>
                <span class="result-value" id="deviationValue">0.000</span>
                <span class="result-unit">米</span>
            </div>
        </div>
        
        <!-- ③ 实际绳长 -->
        <div class="result-card">
            <div class="result-label">③ 实际绳长</div>
            <div>
                <span class="result-value" id="ropeLengthValue">0.000</span>
                <span class="result-unit">米</span>
            </div>
        </div>
        
        <!-- ④ 安全判定 -->
        <div class="safety-section">
            <div class="safety-status safe" id="safetyStatus">✓ 安全</div>
        </div>
        
        <!-- ⑤ 最大安全偏角 -->
        <div class="max-angle" id="maxAngle">⑤ 最大安全偏角 4.47°</div>
    </div>

    <script>
        // 状态变量
        let currentMode = 'manual';
        let currentAngle = 0;
        let baseAlpha = null;
        let alphaHistory = [];
        const HISTORY_SIZE = 3;
        
        // DOM元素
        const heightInput = document.getElementById('heightInput');
        const angleSlider = document.getElementById('angleSlider');
        const angleDisplay = document.getElementById('angleDisplay');
        const angleInput = document.getElementById('angleInput');
        const deviationValue = document.getElementById('deviationValue');
        const ropeLengthValue = document.getElementById('ropeLengthValue');
        const safetyStatus = document.getElementById('safetyStatus');
        const maxAngleEl = document.getElementById('maxAngle');
        const compassNeedle = document.getElementById('compassNeedle');
        const compassTicks = document.getElementById('compassTicks');
        const resetBtn = document.getElementById('resetBtn');
        
        const SAFE_THRESHOLD = 0.3;
        
        // 模式切换
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('manualModeBtn').classList.toggle('active', mode === 'manual');
            document.getElementById('compassModeBtn').classList.toggle('active', mode === 'compass');
            document.getElementById('manualContent').classList.toggle('active', mode === 'manual');
            document.getElementById('compassContent').classList.toggle('active', mode === 'compass');
        }
        
        // 生成罗盘刻度
        function generateTicks() {
            for (let i = 0; i < 36; i++) {
                if (i % 3 === 0) continue;
                const tick = document.createElement('div');
                tick.className = 'compass-tick';
                tick.style.transform = `rotate(${i * 10}deg) translateX(-50%)`;
                compassTicks.appendChild(tick);
            }
        }
        
        // 计算最大安全偏角
        function calculateMaxSafeAngle() {
            const height = parseFloat(heightInput.value) || 20;
            if (height <= 0) return 0;
            const ratio = height / (height + SAFE_THRESHOLD);
            if (ratio < 0 || ratio > 1) return 0;
            return Math.acos(ratio) * 180 / Math.PI;
        }
        
        // 弹跳动画
        function addBounce(el) {
            el.classList.remove('bounce');
            void el.offsetWidth;
            el.classList.add('bounce');
        }
        
        // 更新显示
        function updateDisplay() {
            const height = parseFloat(heightInput.value) || 20;
            
            // 计算伸长偏差 D/cos(θ) - D
            let deviation = 0;
            let ropeLength = height;
            if (currentAngle >= 90) {
                ropeLength = Infinity;
                deviation = Infinity;
            } else if (currentAngle > 0) {
                const rad = currentAngle * Math.PI / 180;
                ropeLength = height / Math.cos(rad);
                deviation = ropeLength - height;
            }
            
            // 更新伸长偏差
            const prevDev = parseFloat(deviationValue.textContent) || 0;
            if (deviation === Infinity) {
                deviationValue.textContent = "∞";
            } else {
                deviationValue.textContent = deviation.toFixed(3);
                if (Math.abs(prevDev - deviation) > 0.001) {
                    addBounce(deviationValue);
                }
            }
            
            // 更新实际绳长
            const prevRope = parseFloat(ropeLengthValue.textContent) || 0;
            if (ropeLength === Infinity) {
                ropeLengthValue.textContent = "∞";
            } else {
                ropeLengthValue.textContent = ropeLength.toFixed(3);
                if (Math.abs(prevRope - ropeLength) > 0.001) {
                    addBounce(ropeLengthValue);
                }
            }
            
            // 安全判定 ≤0.3米安全，>0.3米超标禁止施工
            if (deviation === Infinity || deviation > SAFE_THRESHOLD) {
                safetyStatus.textContent = "❌ 超标禁止施工";
                safetyStatus.className = "safety-status danger";
            } else {
                safetyStatus.textContent = "✓ 安全";
                safetyStatus.className = "safety-status safe";
            }
            
            // 最大安全偏角
            maxAngleEl.textContent = `⑤ 最大安全偏角 ${calculateMaxSafeAngle().toFixed(2)}°`;
            
            // 更新罗盘指针
            compassNeedle.style.transform = `rotate(${currentAngle}deg)`;
            
            // 更新手动模式显示
            if (currentMode === 'manual') {
                angleDisplay.textContent = `${currentAngle.toFixed(1)}°`;
                angleSlider.value = currentAngle;
                angleInput.value = currentAngle.toFixed(1);
            }
        }
        
        // 陀螺仪处理
        function handleOrientation(event) {
            let alpha = event.alpha;
            if (alpha === null || alpha === undefined) return;
            
            if (baseAlpha === null) {
                baseAlpha = alpha;
            }
            
            let delta = alpha - baseAlpha;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            
            alphaHistory.push(delta);
            if (alphaHistory.length > HISTORY_SIZE) alphaHistory.shift();
            
            const smoothed = alphaHistory.reduce((a, b) => a + b, 0) / alphaHistory.length;
            currentAngle = Math.min(90, Math.max(0, Math.abs(smoothed)));
            updateDisplay();
        }
        
        // 归零
        function resetAngle() {
            baseAlpha = null;
            alphaHistory = [];
            currentAngle = 0;
            updateDisplay();
        }
        
        // 事件监听
        heightInput.addEventListener('input', updateDisplay);
        
        angleSlider.addEventListener('input', (e) => {
            currentAngle = parseFloat(e.target.value);
            updateDisplay();
        });
        
        angleInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (!isNaN(val)) {
                currentAngle = Math.min(90, Math.max(0, Math.abs(val)));
                updateDisplay();
            }
        });
        
        resetBtn.addEventListener('click', resetAngle);
        
        // 页面加载
        window.addEventListener('load', () => {
            generateTicks();
            updateDisplay();
            
            // 尝试启用陀螺仪
            if ('DeviceOrientationEvent' in window) {
                const isIOS = typeof DeviceOrientationEvent.requestPermission === 'function';
                if (isIOS) {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) {}
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }
        });
        
        // 页面可见性变化
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                baseAlpha = null;
                alphaHistory = [];
            }
        });
    </script>
</body>
</html>
