<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>乐东英歌海扭王块吊装软件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 60px;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        /* 模式选择按钮 */
        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-btn {
            padding: 12px 24px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #2a2a4a;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: #3a3a5a;
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        /* 通用卡片 */
        .card {
            background: #252540;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
        }
        .card-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        /* ① 吊钩垂直距离 */
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 14px;
            font-size: 18px;
            border: 2px solid #444;
            border-radius: 8px;
            background: #1a1a2e;
            color: #FFD700;
            text-align: center;
        }
        .input-row input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .input-row span {
            font-size: 16px;
            color: #888;
        }
        /* 手动模式滑块 */
        #manual-content {
            display: block;
        }
        #compass-content {
            display: none;
        }
        .slider-container {
            margin-top: 10px;
        }
        .slider-container input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #444;
            border-radius: 4px;
            outline: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #FFD700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }
        .manual-input {
            width: 100px;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 8px;
            background: #1a1a2e;
            color: #FF8C00;
            text-align: center;
        }
        /* 罗盘 */
        #compass-content {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .compass-container {
            position: relative;
            width: 180px;
            height: 180px;
        }
        .compass {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a4a, #1a1a2e);
            border: 4px solid #FFD700;
            position: relative;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .compass-tick {
            position: absolute;
            width: 2px;
            height: 8px;
            background: #666;
            left: 50%;
            top: 8px;
            transform-origin: 50% 82px;
        }
        .compass-tick.major {
            height: 12px;
            width: 3px;
            background: #888;
        }
        .compass-direction {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            color: #FFD700;
        }
        .compass-direction.n { top: 15px; left: 50%; transform: translateX(-50%); }
        .compass-direction.s { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .compass-direction.e { right: 15px; top: 50%; transform: translateY(-50%); }
        .compass-direction.w { left: 15px; top: 50%; transform: translateY(-50%); }
        .compass-center {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #FFD700;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .compass-pointer {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 35px solid #ff4444;
            left: 50%;
            top: 50%;
            transform-origin: 50% 100%;
            transform: translate(-50%, -100%);
        }
        .reset-btn {
            padding: 10px 30px;
            font-size: 16px;
            background: #444;
            border: 2px solid #666;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .reset-btn:active {
            background: #555;
        }
        .compass-hint {
            font-size: 12px;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }
        /* 角度显示 */
        .angle-display {
            text-align: center;
            margin: 10px 0;
        }
        .angle-value {
            font-size: 48px;
            font-weight: bold;
            color: #FF8C00;
            text-shadow: 0 0 20px rgba(255,140,0,0.5);
        }
        .angle-value.manual {
            color: #FF8C00;
        }
        /* 结果卡片 */
        .result-card {
            text-align: center;
            padding: 20px;
        }
        .result-value {
            font-size: 36px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .result-unit {
            font-size: 18px;
            color: #aaa;
        }
        .result-label {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
        /* 安全判定 */
        .safety-card {
            text-align: center;
            padding: 20px;
        }
        .safety-ok {
            font-size: 32px;
            color: #00FF88;
            text-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        .safety-fail {
            font-size: 28px;
            color: #FF4444;
            text-shadow: 0 0 20px rgba(255,68,68,0.5);
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .safety-hint {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
        /* 最大安全偏角 */
        .max-angle-card {
            text-align: center;
        }
        .max-angle-value {
            font-size: 24px;
            color: #FFD700;
        }
        .max-angle-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>乐东英歌海扭王块吊装软件</h1>

    <!-- 模式选择 -->
    <div class="mode-buttons">
        <button class="mode-btn active" id="manualBtn" onclick="switchMode('manual')">✏️ 手动模式</button>
        <button class="mode-btn" id="compassBtn" onclick="switchMode('compass')">🧭 罗盘模式</button>
    </div>

    <!-- ① 吊钩垂直距离 -->
    <div class="card">
        <div class="card-label">① 吊钩垂直距离</div>
        <div class="input-row">
            <input type="number" id="distanceInput" value="20" min="0.1" max="1000" step="0.1">
            <span>米</span>
        </div>
    </div>

    <!-- ②伸长偏差 / ③实际绳长 -->
    <div class="card result-card">
        <div class="card-label">② 伸长偏差</div>
        <div class="result-value" id="deviationValue">0.000</div>
        <div class="result-unit">米</div>
    </div>

    <div class="card result-card">
        <div class="card-label">③ 实际绳长</div>
        <div class="result-value" id="ropeLengthValue">0.000</div>
        <div class="result-unit">米</div>
    </div>

    <!-- 手动模式内容 -->
    <div id="manual-content" class="card">
        <div class="card-label">偏角（手动模式）</div>
        <div class="angle-display">
            <span class="angle-value manual" id="manualAngleDisplay">0.0°</span>
        </div>
        <div class="slider-container">
            <input type="range" id="angleSlider" min="0" max="45" value="0" step="0.1">
            <div class="slider-row">
                <span>0°</span>
                <span>45°</span>
            </div>
        </div>
        <div class="input-row" style="margin-top: 15px; justify-content: center;">
            <input type="number" class="manual-input" id="manualAngleInput" value="0" min="0" max="45" step="0.1">
            <span style="color:#FF8C00;">°</span>
        </div>
    </div>

    <!-- 罗盘模式内容 -->
    <div id="compass-content" class="card">
        <div class="card-label">偏角（罗盘模式）</div>
        <div class="angle-display">
            <span class="angle-value" id="compassAngleDisplay">0.0°</span>
        </div>
        <div class="compass-container">
            <div class="compass">
                <!-- 刻度线 -->
                <div class="compass-tick major" style="transform: rotate(0deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(10deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(20deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(30deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(40deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(50deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(60deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(70deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(80deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(90deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(100deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(110deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(120deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(130deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(140deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(150deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(160deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(170deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(180deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(190deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(200deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(210deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(220deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(230deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(240deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(250deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(260deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(270deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(280deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(290deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(300deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(310deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(320deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(330deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(340deg) translateX(-50%);"></div>
                <div class="compass-tick" style="transform: rotate(350deg) translateX(-50%);"></div>
                <div class="compass-tick major" style="transform: rotate(360deg) translateX(-50%);"></div>
                <!-- 方向 -->
                <span class="compass-direction n">N</span>
                <span class="compass-direction e">E</span>
                <span class="compass-direction s">S</span>
                <span class="compass-direction w">W</span>
                <!-- 指针 -->
                <div class="compass-pointer" id="compassPointer"></div>
                <!-- 中心 -->
                <div class="compass-center"></div>
            </div>
        </div>
        <button class="reset-btn" id="resetBtn">🔄 归零</button>
        <div class="compass-hint">
            使用提示：<br>
            ① 手机屏幕朝自己<br>
            ② 对准垂直线点归零<br>
            ③ 转对准吊绳读数
        </div>
    </div>

    <!-- ④ 安全判定 -->
    <div class="card safety-card">
        <div class="card-label">④ 安全判定</div>
        <div id="safetyResult" class="safety-ok">✓ 安全</div>
        <div class="safety-hint">偏差 ≤ 0.3米</div>
    </div>

    <!-- ⑤ 最大安全偏角 -->
    <div class="card max-angle-card">
        <div class="card-label">⑤ 最大安全偏角</div>
        <div class="max-angle-value" id="maxAngleValue">--</div>
        <div class="max-angle-hint">偏差刚好0.3米时的极限角度</div>
    </div>

    <script>
        // ===== 状态变量 =====
        let currentMode = 'manual';
        let baseAlpha = null;
        let alphaHistory = [];
        let currentAngle = 0;
        let gyroStarted = false;
        let lastRawAlpha = null;

        // ===== DOM元素 =====
        const manualBtn = document.getElementById('manualBtn');
        const compassBtn = document.getElementById('compassBtn');
        const manualContent = document.getElementById('manual-content');
        const compassContent = document.getElementById('compass-content');
        const distanceInput = document.getElementById('distanceInput');
        const angleSlider = document.getElementById('angleSlider');
        const manualAngleInput = document.getElementById('manualAngleInput');
        const manualAngleDisplay = document.getElementById('manualAngleDisplay');
        const compassAngleDisplay = document.getElementById('compassAngleDisplay');
        const compassPointer = document.getElementById('compassPointer');
        const resetBtn = document.getElementById('resetBtn');
        const deviationValue = document.getElementById('deviationValue');
        const ropeLengthValue = document.getElementById('ropeLengthValue');
        const safetyResult = document.getElementById('safetyResult');
        const maxAngleValue = document.getElementById('maxAngleValue');

        // ===== 模式切换 =====
        function switchMode(mode) {
            currentMode = mode;
            manualBtn.classList.toggle('active', mode === 'manual');
            compassBtn.classList.toggle('active', mode === 'compass');
            manualContent.style.display = mode === 'manual' ? 'block' : 'none';
            compassContent.style.display = mode === 'compass' ? 'block' : 'none';
            if (mode === 'compass') {
                startGyro();
            }
            updateDisplay();
        }

        // ===== 陀螺仪启动 =====
        async function startGyro() {
            if (gyroStarted) return;
            if ('DeviceOrientationEvent' in window) {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            gyroStarted = true;
                        }
                    } catch(e) {
                        console.log('陀螺仪权限被拒绝', e);
                    }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroStarted = true;
                }
            }
        }

        // ===== 陀螺仪处理 =====
        function handleOrientation(event) {
            let alpha = event.alpha;
            if (alpha === null || alpha === undefined) return;
            
            lastRawAlpha = alpha;
            
            if (baseAlpha === null) {
                baseAlpha = alpha;
            }
            
            let diff = alpha - baseAlpha;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            
            let angle = Math.abs(diff);
            if (angle > 90) angle = 180 - angle;
            
            alphaHistory.push(angle);
            if (alphaHistory.length > 3) alphaHistory.shift();
            
            let sum = 0;
            for (let i = 0; i < alphaHistory.length; i++) {
                sum += alphaHistory[i];
            }
            currentAngle = sum / alphaHistory.length;
            
            updateDisplay();
        }

        // ===== 归零按钮 =====
        resetBtn.addEventListener('click', function() {
            if (lastRawAlpha !== null) {
                baseAlpha = lastRawAlpha;
            }
            alphaHistory = [];
            currentAngle = 0;
            updateDisplay();
        });

        // ===== 计算函数 =====
        function calculate() {
            let D = parseFloat(distanceInput.value) || 0;
            let angle = currentMode === 'manual' ? parseFloat(manualAngleInput.value) || 0 : currentAngle;
            
            let radians = angle * Math.PI / 180;
            let actualLength = D / Math.cos(radians);
            let deviation = actualLength - D;
            
            return { D, angle, actualLength, deviation };
        }

        // ===== 更新显示 =====
        function updateDisplay() {
            let result = calculate();
            
            // 更新角度显示
            if (currentMode === 'manual') {
                let sliderVal = parseFloat(angleSlider.value);
                let inputVal = parseFloat(manualAngleInput.value) || 0;
                let showAngle = inputVal;
                
                manualAngleDisplay.textContent = showAngle.toFixed(1) + '°';
                result.angle = showAngle;
            } else {
                compassAngleDisplay.textContent = currentAngle.toFixed(1) + '°';
                compassPointer.style.transform = 'translate(-50%, -100%) rotate(' + currentAngle + 'deg)';
                result.angle = currentAngle;
            }
            
            // 重新计算
            let D = result.D;
            let angle = result.angle;
            let radians = angle * Math.PI / 180;
            let actualLength = D / Math.cos(radians);
            let deviation = actualLength - D;
            
            // 显示伸长偏差
            deviationValue.textContent = deviation.toFixed(3);
            ropeLengthValue.textContent = actualLength.toFixed(3);
            
            // 安全判定
            if (deviation <= 0.3) {
                safetyResult.className = 'safety-ok';
                safetyResult.textContent = '✓ 安全';
            } else {
                safetyResult.className = 'safety-fail';
                safetyResult.textContent = '❌ 超标禁止施工';
            }
            
            // 最大安全偏角
            if (D > 0) {
                let ratio = D / (D + 0.3);
                if (ratio >= -1 && ratio <= 1) {
                    let maxAngle = Math.acos(ratio) * 180 / Math.PI;
                    maxAngleValue.textContent = '最大安全偏角 ' + maxAngle.toFixed(2) + '°';
                } else {
                    maxAngleValue.textContent = '最大安全偏角 >90°';
                }
            } else {
                maxAngleValue.textContent = '--';
            }
        }

        // ===== 手动模式事件 =====
        angleSlider.addEventListener('input', function() {
            manualAngleInput.value = this.value;
            updateDisplay();
        });

        manualAngleInput.addEventListener('input', function() {
            let val = parseFloat(this.value) || 0;
            if (val < 0) val = 0;
            if (val > 45) val = 45;
            this.value = val;
            angleSlider.value = val;
            updateDisplay();
        });

        distanceInput.addEventListener('input', updateDisplay);

        // ===== 初始化 =====
        updateDisplay();
    </script>
</body>
</html>
