<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>乐东英歌海扭王块吊装软件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 标题 */
        .title {
            text-align: center;
            font-size: 18px;
            color: #FFD700;
            letter-spacing: 2px;
            padding: 12px 0;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        /* 模式选择按钮 */
        .mode-switch {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 5px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 15px;
            color: #888;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .mode-btn.active {
            color: #FFD700;
            background: rgba(50, 50, 70, 0.9);
            border-color: #FFD700;
            border-width: 2px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        
        /* 吊钩垂直距离 */
        .height-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 18px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
        }
        
        .height-label {
            font-size: 14px;
            color: #ccc;
        }
        
        .height-label span.num {
            color: #FFD700;
            font-weight: bold;
        }
        
        .height-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .height-input {
            width: 80px;
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 6px;
            padding: 5px 10px;
            text-align: center;
            outline: none;
            font-family: inherit;
        }
        
        .height-input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .unit {
            font-size: 16px;
            color: #FFD700;
        }
        
        /* 手动模式 - 滑块区域 */
        .manual-mode {
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 12px;
        }
        
        .slider-wrapper {
            margin-bottom: 15px;
        }
        
        .slider {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            background: rgba(255, 140, 0, 0.2);
            border-radius: 5px;
            outline: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #FF8C00;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);
        }
        
        .slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            background: #FF8C00;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);
        }
        
        .angle-display {
            font-size: 80px;
            font-weight: bold;
            color: #FF8C00;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            line-height: 1;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .angle-input {
            width: 100%;
            font-size: 32px;
            color: #FF8C00;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 140, 0, 0.4);
            border-radius: 8px;
            padding: 10px 15px;
            text-align: center;
            outline: none;
        }
        
        .angle-input:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
        }
        
        /* 罗盘模式 */
        .compass-mode {
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 12px;
            text-align: center;
        }
        
        .compass-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .compass {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a15 100%);
            border: 3px solid #FFD700;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.4),
                inset 0 0 40px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        
        /* 罗盘外圈刻度 */
        .compass-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .compass-tick {
            position: absolute;
            width: 2px;
            height: 8px;
            background: rgba(255, 215, 0, 0.7);
            top: 4px;
            left: 50%;
            transform-origin: center 98px;
        }
        
        .compass-tick.major {
            height: 12px;
            width: 3px;
            background: #FFD700;
        }
        
        /* 方向字母 */
        .compass-direction {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
        }
        
        .compass-n { top: 18px; left: 50%; transform: translateX(-50%); }
        .compass-e { right: 18px; top: 50%; transform: translateY(-50%); }
        .compass-s { bottom: 18px; left: 50%; transform: translateX(-50%); }
        .compass-w { left: 18px; top: 50%; transform: translateY(-50%); }
        
        /* 红色指针 */
        .compass-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 75px;
            transform-origin: center bottom;
            transform: translate(-50%, -100%);
            transition: transform 0.1s ease-out;
        }
        
        .needle-pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 40px solid #FF4444;
            filter: drop-shadow(0 0 8px #FF4444);
        }
        
        .needle-tail {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 35px solid rgba(120, 120, 140, 0.9);
        }
        
        /* 中心圆点 */
        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            z-index: 10;
        }
        
        .compass-angle {
            font-size: 28px;
            font-weight: bold;
            color: #FF8C00;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
            margin-bottom: 12px;
        }
        
        .reset-btn {
            padding: 10px 30px;
            font-size: 14px;
            color: #888;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .reset-btn:active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        /* 隐藏模式 */
        .mode-content {
            display: none;
        }
        
        .mode-content.active {
            display: block;
        }
        
        /* 计算结果区域 */
        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 10px;
        }
        
        .result-label {
            font-size: 14px;
            color: #ccc;
        }
        
        .result-label span.num {
            color: #FFD700;
            font-weight: bold;
        }
        
        .result-value {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 
                0 0 8px #FFD700,
                0 0 15px #FFD700;
        }
        
        .result-unit {
            font-size: 14px;
            color: #FFD700;
            margin-left: 5px;
        }
        
        /* 安全判定 */
        .safety-section {
            text-align: center;
            padding: 18px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 12px;
        }
        
        .safety-status {
            font-size: 26px;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .safety-status.safe {
            color: #00FF88;
            text-shadow: 
                0 0 10px #00FF88,
                0 0 20px #00FF88,
                0 0 40px #00FF88;
        }
        
        .safety-status.danger {
            color: #FF4444;
            text-shadow: 
                0 0 10px #FF4444,
                0 0 20px #FF4444,
                0 0 40px #FF4444;
        }
        
        .safety-hint {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
        
        /* 最大安全偏角 */
        .max-angle-section {
            text-align: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
        }
        
        .max-angle-title {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 5px;
        }
        
        .max-angle-value {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }
        
        .max-angle-hint {
            margin-top: 6px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="title">乐东英歌海扭王块吊装软件</div>
        
        <!-- 模式切换 -->
        <div class="mode-switch">
            <button class="mode-btn active" id="manualModeBtn" onclick="switchMode('manual')">✏️ 手动模式</button>
            <button class="mode-btn" id="compassModeBtn" onclick="switchMode('compass')">🧭 罗盘模式</button>
        </div>
        
        <!-- ① 吊钩垂直距离 -->
        <div class="height-section">
            <div class="height-label"><span class="num">①</span> 吊钩垂直距离</div>
            <div class="height-right">
                <input type="number" class="height-input" id="heightInput" value="20" min="0.1" step="0.1">
                <span class="unit">米</span>
            </div>
        </div>
        
        <!-- 手动模式内容 -->
        <div class="mode-content active" id="manualContent">
            <div class="manual-mode">
                <div class="slider-wrapper">
                    <input type="range" class="slider" id="angleSlider" min="0" max="45" step="0.1" value="0">
                </div>
                <div class="angle-display" id="angleDisplay">0.0°</div>
                <input type="number" class="angle-input" id="angleInput" step="0.1" value="0">
            </div>
        </div>
        
        <!-- 罗盘模式内容 -->
        <div class="mode-content" id="compassContent">
            <div class="compass-mode">
                <div class="compass-angle" id="compassAngle">0.0°</div>
                <div class="compass-container">
                    <div class="compass" id="compass">
                        <div class="compass-ring" id="compassRing"></div>
                        <span class="compass-direction compass-n">N</span>
                        <span class="compass-direction compass-e">E</span>
                        <span class="compass-direction compass-s">S</span>
                        <span class="compass-direction compass-w">W</span>
                        <div class="compass-needle" id="compassNeedle">
                            <div class="needle-pointer"></div>
                            <div class="needle-tail"></div>
                        </div>
                        <div class="compass-center"></div>
                    </div>
                </div>
                <button class="reset-btn" id="resetBtn">归零</button>
            </div>
        </div>
        
        <!-- ② 伸长偏差 -->
        <div class="result-row">
            <div class="result-label"><span class="num">②</span> 伸长偏差</div>
            <div>
                <span class="result-value" id="deviationValue">0.000</span>
                <span class="result-unit">米</span>
            </div>
        </div>
        
        <!-- ③ 实际绳长 -->
        <div class="result-row">
            <div class="result-label"><span class="num">③</span> 实际绳长</div>
            <div>
                <span class="result-value" id="ropeLengthValue">0.000</span>
                <span class="result-unit">米</span>
            </div>
        </div>
        
        <!-- ④ 安全判定 -->
        <div class="safety-section">
            <div class="safety-status safe" id="safetyStatus">✓ 安全</div>
            <div class="safety-hint">偏差≤0.3米</div>
        </div>
        
        <!-- ⑤ 最大安全偏角 -->
        <div class="max-angle-section">
            <div class="max-angle-title">⑤ 最大安全偏角 <span id="maxAngleValue" class="max-angle-value">4.47°</span></div>
            <div class="max-angle-hint">偏差刚好0.3米时的极限角度</div>
        </div>
    </div>

    <script>
        // 状态变量
        let currentMode = 'manual';
        let currentAngle = 0;
        let baseAlpha = null;
        let alphaHistory = [];
        const HISTORY_SIZE = 3;
        const SAFE_THRESHOLD = 0.3;
        
        // DOM元素
        const heightInput = document.getElementById('heightInput');
        const angleSlider = document.getElementById('angleSlider');
        const angleDisplay = document.getElementById('angleDisplay');
        const angleInput = document.getElementById('angleInput');
        const deviationValue = document.getElementById('deviationValue');
        const ropeLengthValue = document.getElementById('ropeLengthValue');
        const safetyStatus = document.getElementById('safetyStatus');
        const maxAngleValue = document.getElementById('maxAngleValue');
        const compassNeedle = document.getElementById('compassNeedle');
        const compassAngle = document.getElementById('compassAngle');
        const compassRing = document.getElementById('compassRing');
        const resetBtn = document.getElementById('resetBtn');
        
        // 模式切换
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('manualModeBtn').classList.toggle('active', mode === 'manual');
            document.getElementById('compassModeBtn').classList.toggle('active', mode === 'compass');
            document.getElementById('manualContent').classList.toggle('active', mode === 'manual');
            document.getElementById('compassContent').classList.toggle('active', mode === 'compass');
        }
        
        // 生成罗盘刻度
        function generateTicks() {
            for (let i = 0; i < 36; i++) {
                const tick = document.createElement('div');
                tick.className = 'compass-tick' + (i % 3 === 0 ? ' major' : '');
                tick.style.transform = `rotate(${i * 10}deg) translateX(-50%)`;
                compassRing.appendChild(tick);
            }
        }
        
        // 计算最大安全偏角: arccos(D/(D+0.3)) * 180/PI
        function calculateMaxSafeAngle() {
            const D = parseFloat(heightInput.value) || 20;
            if (D <= 0) return 0;
            const ratio = D / (D + SAFE_THRESHOLD);
            if (ratio < 0 || ratio > 1) return 0;
            return Math.acos(ratio) * 180 / Math.PI;
        }
        
        // 更新显示
        function updateDisplay() {
            const D = parseFloat(heightInput.value) || 20;
            
            // 计算伸长偏差 = D/cos(θ) - D
            // 计算实际绳长 = D/cos(θ)
            let deviation = 0;
            let ropeLength = D;
            
            if (currentAngle > 0 && currentAngle < 90) {
                const rad = currentAngle * Math.PI / 180;
                ropeLength = D / Math.cos(rad);
                deviation = ropeLength - D;
            }
            
            // 更新伸长偏差
            deviationValue.textContent = deviation.toFixed(3);
            
            // 更新实际绳长
            ropeLengthValue.textContent = ropeLength.toFixed(3);
            
            // 安全判定 ≤0.3米安全，>0.3米超标禁止施工
            if (deviation > SAFE_THRESHOLD) {
                safetyStatus.textContent = "❌ 超标禁止施工";
                safetyStatus.className = "safety-status danger";
            } else {
                safetyStatus.textContent = "✓ 安全";
                safetyStatus.className = "safety-status safe";
            }
            
            // 最大安全偏角
            maxAngleValue.textContent = calculateMaxSafeAngle().toFixed(2) + "°";
            
            // 更新罗盘指针
            compassNeedle.style.transform = `translate(-50%, -100%) rotate(${currentAngle}deg)`;
            
            // 更新手动模式显示
            angleDisplay.textContent = currentAngle.toFixed(1) + "°";
            angleSlider.value = currentAngle;
            angleInput.value = currentAngle.toFixed(1);
            
            // 更新罗盘模式角度显示
            compassAngle.textContent = currentAngle.toFixed(1) + "°";
        }
        
        // 陀螺仪处理
        function handleOrientation(event) {
            let alpha = event.alpha;
            if (alpha === null || alpha === undefined) return;
            
            if (baseAlpha === null) {
                baseAlpha = alpha;
            }
            
            let delta = alpha - baseAlpha;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            
            alphaHistory.push(delta);
            if (alphaHistory.length > HISTORY_SIZE) alphaHistory.shift();
            
            const smoothed = alphaHistory.reduce((a, b) => a + b, 0) / alphaHistory.length;
            currentAngle = Math.min(45, Math.max(0, Math.abs(smoothed)));
            updateDisplay();
        }
        
        // 归零
        function resetAngle() {
            baseAlpha = null;
            alphaHistory = [];
            currentAngle = 0;
            updateDisplay();
        }
        
        // 事件监听
        heightInput.addEventListener('input', updateDisplay);
        
        angleSlider.addEventListener('input', (e) => {
            currentAngle = parseFloat(e.target.value);
            updateDisplay();
        });
        
        angleInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (!isNaN(val)) {
                currentAngle = Math.min(45, Math.max(0, Math.abs(val)));
                updateDisplay();
            }
        });
        
        resetBtn.addEventListener('click', resetAngle);
        
        // 页面加载
        window.addEventListener('load', () => {
            generateTicks();
            updateDisplay();
            
            // 尝试启用陀螺仪
            if ('DeviceOrientationEvent' in window) {
                const isIOS = typeof DeviceOrientationEvent.requestPermission === 'function';
                if (isIOS) {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) {}
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }
        });
        
        // 页面可见性变化
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                baseAlpha = null;
                alphaHistory = [];
            }
        });
    </script>
</body>
</html>
