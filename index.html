<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="乐东英歌海扭王块吊装软件">
    <link rel="manifest" href="manifest.json">
    <title>乐东英歌海扭王块吊装软件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
        }
        
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 标题 */
        .title {
            text-align: center;
            font-size: 14px;
            color: #666;
            letter-spacing: 2px;
            padding: 8px 0;
        }
        
        /* 区域卡片 */
        .card {
            text-align: center;
            padding: 20px;
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 16px;
        }
        
        .card-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        
        /* 垂直距离输入 */
        .height-input {
            width: 160px;
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 10px 20px;
            text-align: center;
            outline: none;
            font-family: inherit;
        }
        
        .height-input:focus {
            border-color: rgba(255, 215, 0, 0.6);
        }
        
        .height-unit {
            font-size: 24px;
            color: #666;
            margin-left: 8px;
        }
        
        /* 偏角显示 */
        .angle-value {
            font-size: 120px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 
                0 0 10px #FFD700,
                0 0 20px #FFD700,
                0 0 40px #FFD700,
                0 0 80px #FFA500;
            line-height: 1;
        }
        
        .angle-value.bounce {
            animation: bounce 0.15s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* 罗盘圆盘 */
        .compass-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .compass {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(20, 20, 40, 0.9);
            border: 3px solid #FFD700;
            box-shadow: 
                0 0 15px rgba(255, 215, 0, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        /* 刻度线 */
        .compass::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 190px;
            height: 190px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: 
                /* 主刻度 - 每30度 */
                radial-gradient(circle, transparent 48%, transparent 50%, #FFD700 50%, #FFD700 52%, transparent 52%),
                /* 12个主刻度 */
                conic-gradient(
                    from 0deg,
                    transparent 0deg, #FFD700 0deg, #FFD700 2deg, transparent 2deg,
                    transparent 28deg, #FFD700 30deg, #FFD700 32deg, transparent 32deg,
                    transparent 58deg, #FFD700 60deg, #FFD700 62deg, transparent 62deg,
                    transparent 88deg, #FFD700 90deg, #FFD700 92deg, transparent 92deg,
                    transparent 118deg, #FFD700 120deg, #FFD700 122deg, transparent 122deg,
                    transparent 148deg, #FFD700 150deg, #FFD700 152deg, transparent 152deg,
                    transparent 178deg, #FFD700 180deg, #FFD700 182deg, transparent 182deg,
                    transparent 208deg, #FFD700 210deg, #FFD700 212deg, transparent 212deg,
                    transparent 238deg, #FFD700 240deg, #FFD700 242deg, transparent 242deg,
                    transparent 268deg, #FFD700 270deg, #FFD700 272deg, transparent 272deg,
                    transparent 298deg, #FFD700 300deg, #FFD700 302deg, transparent 302deg,
                    transparent 328deg, #FFD700 330deg, #FFD700 332deg, transparent 332deg,
                    transparent 358deg, #FFD700 360deg
                );
            background-size: 100% 100%;
            background-position: center;
        }
        
        /* 小刻度 - 每10度 */
        .compass-ticks {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            transform: translate(-50%, -50%);
        }
        
        .compass-tick {
            position: absolute;
            width: 2px;
            height: 8px;
            background: rgba(255, 215, 0, 0.5);
            top: 0;
            left: 50%;
            transform-origin: center 90px;
        }
        
        /* 方向字母 */
        .compass-direction {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }
        
        .compass-n {
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .compass-e {
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .compass-s {
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .compass-w {
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        /* 指针容器 */
        .compass-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 80px;
            transform-origin: center bottom;
            transform: translate(-50%, -100%);
            transition: transform 0.1s ease-out;
        }
        
        /* 红色指针（三角形） */
        .compass-needle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 40px solid #FF4444;
            filter: drop-shadow(0 0 5px #FF4444);
        }
        
        /* 指针尾部 */
        .compass-needle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 40px solid rgba(100, 100, 100, 0.8);
        }
        
        /* 中心圆点 */
        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 5px rgba(255, 215, 0, 0.5),
                inset 0 0 3px rgba(255, 255, 255, 0.3);
            z-index: 10;
        }
        
        /* 归零按钮 */
        .reset-btn {
            margin-top: 15px;
            padding: 10px 24px;
            font-size: 14px;
            color: #888;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .reset-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* 手动输入（陀螺仪不可用时） */
        .manual-input {
            width: 120px;
            font-size: 32px;
            color: #FF9633;
            background: rgba(255, 150, 0, 0.1);
            border: 1px solid rgba(255, 150, 0, 0.3);
            border-radius: 8px;
            padding: 8px 16px;
            text-align: center;
            outline: none;
            margin-top: 10px;
        }
        
        /* 实际延长值 */
        .stretch-value {
            font-size: 100px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 
                0 0 10px #FFD700,
                0 0 20px #FFD700,
                0 0 40px #FFD700;
            line-height: 1;
        }
        
        .stretch-value.bounce {
            animation: bounce 0.15s ease;
        }
        
        .stretch-unit {
            font-size: 32px;
            color: #888;
            margin-left: 5px;
        }
        
        /* 安全判定 */
        .safety-section {
            text-align: center;
            padding: 15px;
        }
        
        .safety-status {
            font-size: 36px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .safety-status.safe {
            color: #00FF88;
            text-shadow: 
                0 0 10px #00FF88,
                0 0 20px #00FF88,
                0 0 40px #00FF88;
        }
        
        .safety-status.danger {
            color: #FF4444;
            text-shadow: 
                0 0 10px #FF4444,
                0 0 20px #FF4444;
        }
        
        /* 最大安全偏角 */
        .max-angle {
            text-align: center;
            font-size: 14px;
            color: #555;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">乐东英歌海扭王块吊装软件</div>
        
        <!-- ① 垂直距离 -->
        <div class="card">
            <div class="card-label">垂直距离</div>
            <div>
                <input type="number" class="height-input" id="heightInput" value="30" min="0.1" step="0.1">
                <span class="height-unit">米</span>
            </div>
        </div>
        
        <!-- ② 偏角 -->
        <div class="card">
            <div class="card-label">偏角</div>
            <!-- 罗盘圆盘 -->
            <div class="compass-container">
                <div class="compass" id="compass">
                    <!-- 小刻度 -->
                    <div class="compass-ticks" id="compassTicks"></div>
                    <!-- 方向字母 -->
                    <span class="compass-direction compass-n">N</span>
                    <span class="compass-direction compass-e">E</span>
                    <span class="compass-direction compass-s">S</span>
                    <span class="compass-direction compass-w">W</span>
                    <!-- 指针 -->
                    <div class="compass-needle" id="compassNeedle"></div>
                    <!-- 中心圆点 -->
                    <div class="compass-center"></div>
                </div>
            </div>
            <div class="angle-value" id="angleValue">0.0°</div>
            <button class="reset-btn" id="resetBtn">归零</button>
            <input type="number" class="manual-input" id="manualAngle" placeholder="手动输入" step="0.1" style="display:none">
        </div>
        
        <!-- ③ 实际延长值 -->
        <div class="card">
            <div class="card-label">实际绳长</div>
            <div>
                <span class="stretch-value" id="stretchValue">0.000</span>
                <span class="stretch-unit">米</span>
            </div>
        </div>
        
        <!-- 安全判定 -->
        <div class="safety-section">
            <div class="safety-status safe" id="safetyStatus">✓ 安全</div>
        </div>
        
        <!-- 最大安全偏角 -->
        <div class="max-angle" id="maxAngle">最大安全偏角 4.47°</div>
    </div>

    <script>
        // 状态变量
        let baseAlpha = null;
        let currentAngle = 0;
        let alphaHistory = [];
        const HISTORY_SIZE = 3;
        let gyroEnabled = false;
        
        // DOM元素
        const heightInput = document.getElementById('heightInput');
        const angleValue = document.getElementById('angleValue');
        const stretchValue = document.getElementById('stretchValue');
        const safetyStatus = document.getElementById('safetyStatus');
        const maxAngleEl = document.getElementById('maxAngle');
        const resetBtn = document.getElementById('resetBtn');
        const manualAngle = document.getElementById('manualAngle');
        const compassNeedle = document.getElementById('compassNeedle');
        const compassTicks = document.getElementById('compassTicks');
        
        const SAFE_THRESHOLD = 0.3;
        
        // 生成小刻度（每10度）
        function generateTicks() {
            for (let i = 0; i < 36; i++) {
                // 跳过30度的位置（主刻度由CSS边框处理）
                if (i % 3 === 0) continue;
                const tick = document.createElement('div');
                tick.className = 'compass-tick';
                tick.style.transform = `rotate(${i * 10}deg) translateX(-50%)`;
                compassTicks.appendChild(tick);
            }
        }
        
        // 计算最大安全偏角
        function calculateMaxSafeAngle() {
            const height = parseFloat(heightInput.value) || 30;
            if (height <= 0) return 0;
            const ratio = height / (height + SAFE_THRESHOLD);
            if (ratio < 0 || ratio > 1) return 0;
            return Math.acos(ratio) * 180 / Math.PI;
        }
        
        // 计算实际绳长
        function calculateStretch() {
            const height = parseFloat(heightInput.value) || 30;
            if (currentAngle >= 90) return Infinity;
            const ropeLength = height / Math.cos(currentAngle * Math.PI / 180);
            return Math.max(0, ropeLength);
        }
        
        // 弹跳动画
        function addBounce(el) {
            el.classList.remove('bounce');
            void el.offsetWidth;
            el.classList.add('bounce');
        }
        
        // 更新显示
        function updateDisplay() {
            const displayAngle = Math.abs(currentAngle).toFixed(1);
            const prevAngle = parseFloat(angleValue.textContent) || 0;
            angleValue.textContent = `${displayAngle}°`;
            if (Math.abs(prevAngle - parseFloat(displayAngle)) > 0.1) {
                addBounce(angleValue);
            }
            
            const stretch = calculateStretch();
            const prevStretch = parseFloat(stretchValue.textContent) || 0;
            
            if (stretch === Infinity) {
                stretchValue.textContent = "∞";
            } else {
                stretchValue.textContent = stretch.toFixed(2);
                if (Math.abs(prevStretch - stretch) > 0.01) {
                    addBounce(stretchValue);
                }
            }
            
            // 安全判定用差值：绳长 - 垂直距离
            const height = parseFloat(heightInput.value) || 30;
            const diff = stretch === Infinity ? Infinity : stretch - height;
            if (diff === Infinity || diff > SAFE_THRESHOLD) {
                safetyStatus.textContent = "✗ 超标";
                safetyStatus.className = "safety-status danger";
            } else {
                safetyStatus.textContent = "✓ 安全";
                safetyStatus.className = "safety-status safe";
            }
            
            maxAngleEl.textContent = `最大安全偏角 ${calculateMaxSafeAngle().toFixed(2)}°`;
            
            // 更新罗盘指针
            compassNeedle.style.transform = `rotate(${currentAngle}deg)`;
        }
        
        // 陀螺仪数据处理
        function handleOrientation(event) {
            let alpha = event.alpha;
            if (alpha === null || alpha === undefined) return;
            
            if (baseAlpha === null) {
                baseAlpha = alpha;
            }
            
            let delta = alpha - baseAlpha;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            
            alphaHistory.push(delta);
            if (alphaHistory.length > HISTORY_SIZE) alphaHistory.shift();
            
            const smoothed = alphaHistory.reduce((a, b) => a + b, 0) / alphaHistory.length;
            currentAngle = Math.min(90, Math.max(0, Math.abs(smoothed)));
            updateDisplay();
        }
        
        // 归零
        function resetAngle() {
            baseAlpha = null;
            currentAngle = 0;
            alphaHistory = [];
            updateDisplay();
            addBounce(angleValue);
        }
        
        // 手动输入
        manualAngle.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (!isNaN(val)) {
                currentAngle = Math.min(90, Math.max(0, Math.abs(val)));
                updateDisplay();
            }
        });
        
        // 事件监听
        heightInput.addEventListener('input', updateDisplay);
        resetBtn.addEventListener('click', resetAngle);
        
        // 页面加载
        window.addEventListener('load', async () => {
            // 生成刻度
            generateTicks();
            updateDisplay();
            
            const isIOS = typeof DeviceOrientationEvent !== 'undefined' && 
                          typeof DeviceOrientationEvent.requestPermission === 'function';
            const hasGyro = 'DeviceOrientationEvent' in window;
            
            if (isIOS) {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        gyroEnabled = true;
                    } else {
                        manualAngle.style.display = 'block';
                    }
                } catch (e) {
                    manualAngle.style.display = 'block';
                }
            } else if (hasGyro) {
                window.addEventListener('deviceorientation', handleOrientation);
                gyroEnabled = true;
            } else {
                manualAngle.style.display = 'block';
            }
        });
        
        // 页面可见性变化时重新归零
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                baseAlpha = null;
                alphaHistory = [];
            }
        });
    </script>
</body>
</html>
