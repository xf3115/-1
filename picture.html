<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>智能P图改字</title>
<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#e0e0e0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;touch-action:none;user-select:none}

.topbar{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(17,17,17,.95);border-bottom:1px solid #333;z-index:10}
.topbar h1{font-size:15px;color:#ff6b00;text-shadow:0 0 8px rgba(255,107,0,.4)}
.topbar-btns{display:flex;gap:5px}
.tbtn{background:#222;border:1px solid #444;color:#ddd;padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer}
.tbtn:active{background:#ff6b00;color:#000;border-color:#ff6b00}
.tbtn.primary{background:#ff6b00;color:#000;border-color:#ff6b00;font-weight:bold}

/* 图片容器 - 支持缩放平移 */
.img-wrap{position:fixed;top:44px;left:0;right:0;bottom:0;background:#111;overflow:hidden}
.img-inner{position:absolute;transform-origin:0 0;will-change:transform}
#photo{display:block;max-width:none}

.upload-mask{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.92);z-index:15}
.upload-mask .icon{font-size:56px;margin-bottom:12px}
.upload-mask p{color:#888;font-size:13px;margin-top:8px}
.big-btn{background:#ff6b00;color:#000;font-size:17px;font-weight:bold;padding:14px 40px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 0 20px rgba(255,107,0,.4)}

/* 缩放提示 */
.zoom-hint{position:fixed;top:50px;right:10px;background:rgba(0,0,0,.8);color:#ff6b00;font-size:11px;padding:3px 8px;border-radius:10px;z-index:8;display:none}

/* 文字框 */
.tbox{position:absolute;border:2px dashed rgba(255,107,0,.7);border-radius:2px;cursor:pointer;z-index:5;background:rgba(255,107,0,.08);transition:background .1s}
.tbox:active,.tbox.sel{border-color:#ff0;background:rgba(255,107,0,.25)}
.tbox .tl{position:absolute;top:-16px;left:0;font-size:9px;background:#ff6b00;color:#000;padding:1px 5px;border-radius:2px;white-space:nowrap;pointer-events:none;max-width:120px;overflow:hidden;text-overflow:ellipsis}

.edit-panel{position:fixed;bottom:0;left:0;right:0;background:#181818;border-top:2px solid #ff6b00;padding:10px 12px;padding-bottom:max(10px, env(safe-area-inset-bottom));z-index:20;display:none;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.edit-panel .row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.edit-panel label{font-size:12px;color:#999;min-width:36px}
.edit-panel input[type=text]{flex:1;background:#1a1a1a;border:1px solid #444;color:#fff;padding:7px 10px;border-radius:6px;font-size:16px;outline:none}
.edit-panel input[type=text]:focus{border-color:#ff6b00}
.edit-panel input[type=range]{flex:1;accent-color:#ff6b00;height:24px}
.edit-panel .val{font-size:12px;color:#ff6b00;min-width:24px;text-align:right}
.oinfo{font-size:11px;color:#888;margin-bottom:6px;padding:4px 8px;background:#1a1a1a;border-radius:4px}
.oinfo b{color:#ff6b00}
.cdot{width:22px;height:22px;border-radius:50%;border:2px solid #555;cursor:pointer;flex-shrink:0}
.cdot:active{border-color:#ff6b00}
.cpreview{width:22px;height:22px;border-radius:50%;border:2px solid #ff6b00;flex-shrink:0}
.btn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}

.progress-bar{position:fixed;top:44px;left:0;right:0;height:3px;background:#222;z-index:12;display:none}
.progress-bar .fill{height:100%;background:#ff6b00;width:0%;transition:width .3s}
.progress-text{position:fixed;top:54px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#ff6b00;font-size:13px;padding:6px 16px;border-radius:20px;z-index:12;display:none;white-space:nowrap}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(255,107,0,.95);color:#000;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:bold;z-index:99;display:none;white-space:nowrap}
.toast.show{display:block;animation:ta 1.8s ease}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}

#fileInput{display:none}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚡ 智能P图改字</h1>
  <div class="topbar-btns">
    <button class="tbtn" id="btnUndo">↩撤销</button>
    <button class="tbtn" id="btnResetZoom">📐复位</button>
    <button class="tbtn" id="btnReOCR">🔍识别</button>
    <button class="tbtn primary" id="btnSave">💾保存</button>
  </div>
</div>

<div class="img-wrap" id="imgWrap">
  <div class="upload-mask" id="uploadMask">
    <div class="icon">📷</div>
    <button class="big-btn" id="btnUpload">上传图片</button>
    <p>自动识别文字，点击即可修改</p>
    <p style="color:#666;font-size:11px;margin-top:4px">双指缩放 · 单指拖动</p>
  </div>
  <div class="img-inner" id="imgInner">
    <img id="photo" src="" alt="">
  </div>
  <div class="zoom-hint" id="zoomHint">1.0x</div>
</div>

<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>

<div class="edit-panel" id="editPanel">
  <div class="oinfo">原文：<b id="origText">-</b> ｜ 字号：<b id="origSize">-</b> ｜ 颜色：<b id="origColor">-</b></div>
  <div class="row">
    <label>新文字</label>
    <input type="text" id="inputText" placeholder="输入替换内容">
  </div>
  <div class="row">
    <label>字号</label>
    <input type="range" id="fontSizeSlider" min="6" max="200" value="24">
    <span class="val" id="fontSizeVal">24</span>
    <label>粗细</label>
    <input type="range" id="fontWeightSlider" min="100" max="900" step="100" value="700" style="width:70px">
    <span class="val" id="fontWeightVal">粗</span>
  </div>
  <div class="row">
    <label>颜色</label>
    <div class="cpreview" id="colorPreview" style="background:#fff"></div>
    <input type="color" id="colorPicker" value="#ffffff" style="position:absolute;opacity:0;width:0;height:0">
    <div class="cdot" style="background:#ffffff" data-c="#ffffff"></div>
    <div class="cdot" style="background:#000000" data-c="#000000"></div>
    <div class="cdot" style="background:#ff0000" data-c="#ff0000"></div>
    <div class="cdot" style="background:#ff6b00" data-c="#ff6b00"></div>
    <div class="cdot" style="background:#0066ff" data-c="#0066ff"></div>
    <div class="cdot" style="background:#00aa00" data-c="#00aa00"></div>
    <div class="cdot" style="background:#ffff00" data-c="#ffff00"></div>
  </div>
  <div class="btn-row">
    <button class="tbtn" id="btnDeleteText">🗑 删除原文</button>
    <button class="tbtn" id="btnCancelEdit">取消</button>
    <button class="tbtn primary" id="btnApply">✅ 写入</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const photo = $('photo');
const wrap = $('imgWrap');
const inner = $('imgInner');

let img = null, imgW = 0, imgH = 0;
let imgDataUrl = '';
let textRegions = [];
let selIdx = -1;
let editColor = '#fff', editFontSize = 24, editFontWeight = 700;
let histStack = [];
const MAX_HIST = 15;

// ===== 缩放平移 =====
let scale = 1, tx = 0, ty = 0;
let baseScale = 1; // 适配屏幕的初始缩放
let minScale = 0.3, maxScale = 8;
let pinchStartDist = 0, pinchStartScale = 1;
let dragStartX = 0, dragStartY = 0, dragStartTx = 0, dragStartTy = 0;
let isPinching = false;
let lastTouchTime = 0;

function updateTransform() {
  inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  $('zoomHint').textContent = scale.toFixed(1) + 'x';
  $('zoomHint').style.display = (Math.abs(scale - baseScale) > 0.05) ? 'block' : 'none';
  renderOverlays();
}

function resetZoom() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  baseScale = Math.min(ww / imgW, wh / imgH);
  scale = baseScale;
  const dw = imgW * scale, dh = imgH * scale;
  tx = (ww - dw) / 2;
  ty = (wh - dh) / 2;
  updateTransform();
}

// 触摸事件
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // 双指缩放
    isPinching = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx * dx + dy * dy);
    pinchStartScale = scale;
    e.preventDefault();
  } else if (e.touches.length === 1) {
    // 单指拖动
    isPinching = false;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragStartTx = tx;
    dragStartTy = ty;
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && isPinching) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const newScale = pinchStartScale * (dist / pinchStartDist);
    scale = Math.max(minScale, Math.min(maxScale, newScale));
    // 以双指中心点缩放
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const ratio = scale / pinchStartScale;
    tx = cx - ratio * (cx - tx);
    ty = cy - ratio * (cy - ty);
    updateTransform();
    e.preventDefault();
  } else if (e.touches.length === 1 && !isPinching) {
    // 编辑面板打开时不拖动
    if ($('editPanel').style.display === 'block') return;
    const dx = e.touches[0].clientX - dragStartX;
    const dy = e.touches[0].clientY - dragStartY;
    tx = dragStartTx + dx;
    ty = dragStartTy + dy;
    updateTransform();
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (e.touches.length < 2) isPinching = false;
});

// 双击放大/复位
wrap.addEventListener('click', e => {
  if (e.target === wrap || e.target === photo) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      // 双击
      if (Math.abs(scale - baseScale) < 0.05) {
        scale = baseScale * 2.5;
      } else {
        scale = baseScale;
      }
      tx = (wrap.clientWidth - imgW * scale) / 2;
      ty = (wrap.clientHeight - imgH * scale) / 2;
      updateTransform();
    }
    lastTouchTime = now;
    closeEdit();
  }
});

$('btnResetZoom').onclick = () => { if (img) resetZoom(); };

// ===== 上传 =====
$('btnUpload').onclick = () => $('fileInput').click();
$('fileInput').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
document.addEventListener('paste', e => {
  for (const it of (e.clipboardData?.items || []))
    if (it.type.startsWith('image/')) { loadFile(it.getAsFile()); break; }
});

function loadFile(f) {
  const r = new FileReader();
  r.onload = ev => {
    const i = new Image();
    i.onload = () => {
      img = i; imgW = i.naturalWidth; imgH = i.naturalHeight;
      imgDataUrl = ev.target.result;
      photo.src = imgDataUrl;
      photo.style.width = imgW + 'px';
      photo.style.height = imgH + 'px';
      $('uploadMask').style.display = 'none';
      histStack = [];
      pushHist();
      resetZoom();
      setTimeout(() => runOCR(), 400);
    };
    i.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

// ===== OCR =====
async function runOCR() {
  clearOverlays();
  $('progressBar').style.display = 'block';
  $('progressText').style.display = 'block';
  $('progressText').textContent = '🔍 识别中...';
  $('progressFill').style.width = '0%';
  try {
    const result = await Tesseract.recognize(img, 'chi_sim+eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const p = Math.round((m.progress || 0) * 100);
          $('progressFill').style.width = p + '%';
          $('progressText').textContent = '🔍 识别中 ' + p + '%';
        }
      }
    });
    textRegions = [];
    for (const w of (result.data.words || [])) {
      if (!w.text || !w.text.trim()) continue;
      const b = w.bbox;
      textRegions.push({
        text: w.text.trim(),
        x0: b.x0, y0: b.y0, x1: b.x1, y1: b.y1,
        fontSize: Math.round((b.y1 - b.y0) * 1.15),
        color: '#ffffff'
      });
    }
    for (const r of textRegions) r.color = sampleColor(r);
    $('progressBar').style.display = 'none';
    $('progressText').style.display = 'none';
    renderOverlays();
    toast('识别完成！' + textRegions.length + ' 处文字，点击编辑');
  } catch(e) {
    $('progressBar').style.display = 'none';
    $('progressText').style.display = 'none';
    toast('识别失败，请重试');
    console.error(e);
  }
}

function sampleColor(r) {
  const tc = document.createElement('canvas');
  tc.width = imgW; tc.height = imgH;
  const tx = tc.getContext('2d');
  tx.drawImage(img, 0, 0, imgW, imgH);
  try {
    const cx = Math.round((r.x0 + r.x1) / 2);
    const cy = Math.round((r.y0 + r.y1) / 2);
    const sw = Math.max(1, Math.round((r.x1 - r.x0) * 0.5));
    const sh = Math.max(1, Math.round((r.y1 - r.y0) * 0.5));
    const sx = Math.max(0, cx - Math.round(sw / 2));
    const sy = Math.max(0, cy - Math.round(sh / 2));
    const data = tx.getImageData(sx, sy, Math.min(sw, imgW - sx), Math.min(sh, imgH - sy)).data;
    let bgR = 0, bgG = 0, bgB = 0, n = 0;
    for (let i = 0; i < data.length; i += 16) { bgR += data[i]; bgG += data[i+1]; bgB += data[i+2]; n++; }
    if (n) { bgR = Math.round(bgR/n); bgG = Math.round(bgG/n); bgB = Math.round(bgB/n); }
    let br = 255, bg2 = 255, bb = 255, maxD = 0;
    for (let i = 0; i < data.length; i += 16) {
      const d = Math.abs(data[i]-bgR) + Math.abs(data[i+1]-bgG) + Math.abs(data[i+2]-bgB);
      if (d > maxD) { maxD = d; br = data[i]; bg2 = data[i+1]; bb = data[i+2]; }
    }
    return '#' + [br, bg2, bb].map(v => Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
  } catch(e) { return '#ffffff'; }
}

// ===== 文字框 =====
function renderOverlays() {
  clearOverlays();
  // 文字框是inner的子元素，随缩放一起变换
  for (let i = 0; i < textRegions.length; i++) {
    const r = textRegions[i];
    const el = document.createElement('div');
    el.className = 'tbox';
    el.dataset.idx = i;
    el.style.cssText = `left:${r.x0}px;top:${r.y0}px;width:${r.x1 - r.x0}px;height:${r.y1 - r.y0}px`;
    el.innerHTML = `<span class="tl">${r.text}</span>`;
    el.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: false });
    el.addEventListener('click', e => { e.stopPropagation(); selectRegion(i); });
    inner.appendChild(el);
  }
}
function clearOverlays() { inner.querySelectorAll('.tbox').forEach(el => el.remove()); }

// ===== 选择编辑 =====
function selectRegion(idx) {
  selIdx = idx;
  const r = textRegions[idx];
  editColor = r.color; editFontSize = r.fontSize; editFontWeight = 700;
  inner.querySelectorAll('.tbox').forEach((el, i) => el.classList.toggle('sel', i === idx));
  $('origText').textContent = r.text;
  $('origSize').textContent = r.fontSize + 'px';
  $('origColor').textContent = r.color;
  $('inputText').value = r.text;
  $('fontSizeSlider').value = r.fontSize;
  $('fontSizeVal').textContent = r.fontSize;
  $('fontWeightSlider').value = 700;
  $('fontWeightVal').textContent = '粗';
  setColor(r.color);
  $('editPanel').style.display = 'block';
  $('inputText').focus();
}

// ===== 写入 =====
$('btnApply').onclick = () => {
  if (selIdx < 0) return;
  const newText = $('inputText').value;
  if (!newText) { toast('请输入文字'); return; }
  pushHist();
  const r = textRegions[selIdx];
  applyEdit(r, newText);
  r.text = newText;
  closeEdit();
  toast('已写入 ✓');
};

function doEdit(r, newText, isDelete) {
  const tc = document.createElement('canvas');
  tc.width = imgW; tc.height = imgH;
  const tx = tc.getContext('2d');
  tx.drawImage(img, 0, 0, imgW, imgH);
  
  // 背景色覆盖
  const pad = 4;
  const edges = [
    [Math.max(0, r.x0 - pad), r.y0],
    [Math.min(imgW - 1, r.x1 + pad), r.y0],
    [r.x0, Math.max(0, r.y0 - pad)],
    [r.x0, Math.min(imgH - 1, r.y1 + pad)],
  ];
  let bgR = 128, bgG2 = 128, bgB = 128;
  try {
    const ec = [];
    for (const [sx, sy] of edges) { const p = tx.getImageData(sx, sy, 1, 1).data; ec.push([p[0], p[1], p[2]]); }
    bgR = Math.round(ec.reduce((s,c)=>s+c[0],0)/ec.length);
    bgG2 = Math.round(ec.reduce((s,c)=>s+c[1],0)/ec.length);
    bgB = Math.round(ec.reduce((s,c)=>s+c[2],0)/ec.length);
  } catch(e) {}
  tx.fillStyle = `rgb(${bgR},${bgG2},${bgB})`;
  tx.fillRect(r.x0 - 2, r.y0 - 1, (r.x1 - r.x0) + 4, (r.y1 - r.y0) + 2);
  
  // 写新文字（如果不是删除）
  if (!isDelete && newText) {
    tx.save();
    const fs = editFontSize;
    tx.font = `${editFontWeight} ${fs}px -apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif`;
    tx.fillStyle = editColor;
    tx.textBaseline = 'top';
    tx.fillText(newText, r.x0, r.y0 + ((r.y1 - r.y0) - fs) / 2);
    tx.restore();
  }
  
  imgDataUrl = tc.toDataURL('image/png');
  photo.src = imgDataUrl;
  const newImg = new Image();
  newImg.onload = () => { img = newImg; renderOverlays(); };
  newImg.src = imgDataUrl;
}

function applyEdit(r, newText) { doEdit(r, newText, false); }
function applyDelete(r) { doEdit(r, '', true); }

$('btnDeleteText').onclick = () => {
  if (selIdx < 0) return;
  pushHist();
  applyDelete(textRegions[selIdx]);
  textRegions.splice(selIdx, 1);
  closeEdit();
  toast('已删除 ✓');
};

// ===== 颜色/字号/粗细 =====
function setColor(hex) { editColor = hex; $('colorPreview').style.background = hex; $('colorPicker').value = hex; }
$('colorPreview').onclick = () => $('colorPicker').click();
$('colorPicker').oninput = e => setColor(e.target.value);
document.querySelectorAll('.cdot').forEach(d => d.onclick = () => setColor(d.dataset.c));
$('fontSizeSlider').oninput = e => { editFontSize = +e.target.value; $('fontSizeVal').textContent = editFontSize; };
$('fontWeightSlider').oninput = e => {
  editFontWeight = +e.target.value;
  const lb = {100:'极细',200:'细',300:'偏细',400:'常规',500:'中',600:'偏粗',700:'粗',800:'特粗',900:'极粗'};
  $('fontWeightVal').textContent = lb[editFontWeight] || '粗';
};
$('btnCancelEdit').onclick = closeEdit;
function closeEdit() { $('editPanel').style.display = 'none'; selIdx = -1; inner.querySelectorAll('.tbox').forEach(el => el.classList.remove('sel')); }

// ===== 历史 =====
function pushHist() { histStack.push(imgDataUrl); if (histStack.length > MAX_HIST) histStack.shift(); }
$('btnUndo').onclick = () => {
  if (!histStack.length) { toast('没有可撤销的'); return; }
  imgDataUrl = histStack.pop();
  photo.src = imgDataUrl;
  const i = new Image();
  i.onload = () => { img = i; runOCR(); };
  i.src = imgDataUrl;
  toast('已撤销');
};

// ===== 重识别 =====
$('btnReOCR').onclick = () => { if (img) runOCR(); };

// ===== 保存到相册 =====
$('btnSave').onclick = async () => {
  if (!img) return;
  
  // 尝试用 Web Share API（部分手机浏览器支持直接保存到相册）
  try {
    const resp = await fetch(imgDataUrl);
    const blob = await resp.blob();
    const file = new File([blob], 'P图结果_' + Date.now() + '.png', { type: 'image/png' });
    
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        text: 'P图结果'
      });
      toast('已保存/分享 ✓');
      return;
    }
  } catch(e) {
    // Share API不可用或用户取消，走下载
  }
  
  // 降级：下载到手机
  const a = document.createElement('a');
  a.download = 'P图结果_' + Date.now() + '.png';
  a.href = imgDataUrl;
  a.click();
  toast('已保存到下载文件夹 📸');
};

// ===== Resize =====
window.addEventListener('resize', () => { if (img) resetZoom(); });

// ===== Toast =====
function toast(msg) {
  const t = $('toast'); t.textContent = msg;
  t.classList.remove('show'); void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
