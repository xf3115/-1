<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>智能P图改字</title>
<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#e0e0e0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;touch-action:none}

/* 顶部栏 */
.topbar{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#111;border-bottom:1px solid #333;z-index:10}
.topbar h1{font-size:15px;color:#ff6b00;text-shadow:0 0 10px rgba(255,107,0,.5)}
.topbar-btns{display:flex;gap:5px}
.tbtn{background:#222;border:1px solid #444;color:#ddd;padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer}
.tbtn:active{background:#ff6b00;color:#000;border-color:#ff6b00}
.tbtn.primary{background:#ff6b00;color:#000;border-color:#ff6b00;font-weight:bold}

/* 图片容器 */
.img-wrap{position:fixed;top:44px;left:0;right:0;bottom:0;background:#111;overflow:hidden}
.img-wrap canvas{position:absolute;top:0;left:0}

/* 上传遮罩 */
.upload-mask{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:15}
.upload-mask .icon{font-size:56px;margin-bottom:12px}
.upload-mask p{color:#888;font-size:13px;margin-top:8px}
.big-btn{background:#ff6b00;color:#000;font-size:17px;font-weight:bold;padding:14px 40px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 0 20px rgba(255,107,0,.4)}

/* 文字框 */
.text-overlay{position:absolute;cursor:pointer;border:2px dashed transparent;border-radius:2px;z-index:5;background:transparent;transition:all .15s}
.text-overlay.active{border-color:#ff6b00;background:rgba(255,107,0,.15)}
.text-overlay .lbl{position:absolute;top:-16px;left:0;font-size:9px;background:#ff6b00;color:#000;padding:1px 4px;border-radius:2px;white-space:nowrap;pointer-events:none}

/* 编辑面板 */
.edit-panel{position:fixed;bottom:0;left:0;right:0;background:#181818;border-top:2px solid #ff6b00;padding:10px 12px;z-index:20;display:none;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.edit-panel .row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.edit-panel .row:last-child{margin-bottom:0}
.edit-panel label{font-size:12px;color:#999;min-width:36px}
.edit-panel input[type=text]{flex:1;background:#1a1a1a;border:1px solid #444;color:#fff;padding:7px 10px;border-radius:6px;font-size:16px;outline:none}
.edit-panel input[type=text]:focus{border-color:#ff6b00}
.edit-panel input[type=range]{flex:1;accent-color:#ff6b00;height:24px}
.edit-panel .val{font-size:12px;color:#ff6b00;min-width:24px;text-align:right}
.orig-info{font-size:11px;color:#888;margin-bottom:6px;padding:4px 8px;background:#1a1a1a;border-radius:4px}
.orig-info b{color:#ff6b00}
.cdot{width:22px;height:22px;border-radius:50%;border:2px solid #555;cursor:pointer;flex-shrink:0}
.cdot:active{border-color:#ff6b00}
.cpreview{width:22px;height:22px;border-radius:50%;border:2px solid #ff6b00;flex-shrink:0}
.btn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}

/* 进度 */
.progress-bar{position:fixed;top:44px;left:0;right:0;height:3px;background:#222;z-index:12;display:none}
.progress-bar .fill{height:100%;background:#ff6b00;width:0%;transition:width .3s}
.progress-text{position:fixed;top:54px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#ff6b00;font-size:13px;padding:6px 16px;border-radius:20px;z-index:12;display:none;white-space:nowrap}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(255,107,0,.95);color:#000;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:bold;z-index:99;display:none;white-space:nowrap}
.toast.show{display:block;animation:toastA 1.8s ease}
@keyframes toastA{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}

#fileInput{display:none}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚡ 智能P图改字</h1>
  <div class="topbar-btns">
    <button class="tbtn" id="btnUndo">↩撤销</button>
    <button class="tbtn" id="btnReOCR">🔍重识别</button>
    <button class="tbtn primary" id="btnSave">💾保存</button>
  </div>
</div>

<div class="img-wrap" id="imgWrap">
  <div class="upload-mask" id="uploadMask">
    <div class="icon">📷</div>
    <button class="big-btn" id="btnUpload">上传图片</button>
    <p>自动识别文字，点击即可修改</p>
  </div>
  <canvas id="mainCanvas"></canvas>
</div>

<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>

<div class="edit-panel" id="editPanel">
  <div class="orig-info" id="origInfo">原文：<b id="origText">-</b> ｜ 字号：<b id="origSize">-</b> ｜ 颜色：<b id="origColor">-</b></div>
  <div class="row">
    <label>新文字</label>
    <input type="text" id="inputText" placeholder="输入替换内容">
  </div>
  <div class="row">
    <label>字号</label>
    <input type="range" id="fontSizeSlider" min="6" max="200" value="24">
    <span class="val" id="fontSizeVal">24</span>
    <label>粗细</label>
    <input type="range" id="fontWeightSlider" min="100" max="900" step="100" value="700" style="width:70px">
    <span class="val" id="fontWeightVal">粗</span>
  </div>
  <div class="row">
    <label>颜色</label>
    <div class="cpreview" id="colorPreview" style="background:#fff"></div>
    <input type="color" id="colorPicker" value="#ffffff" style="position:absolute;opacity:0;width:0;height:0">
    <div class="cdot" style="background:#ffffff" data-c="#ffffff"></div>
    <div class="cdot" style="background:#000000" data-c="#000000"></div>
    <div class="cdot" style="background:#ff0000" data-c="#ff0000"></div>
    <div class="cdot" style="background:#ff6b00" data-c="#ff6b00"></div>
    <div class="cdot" style="background:#0066ff" data-c="#0066ff"></div>
    <div class="cdot" style="background:#00aa00" data-c="#00aa00"></div>
    <div class="cdot" style="background:#ffff00" data-c="#ffff00"></div>
  </div>
  <div class="btn-row">
    <button class="tbtn" id="btnDeleteText">🗑 删除原文</button>
    <button class="tbtn" id="btnCancelEdit">取消</button>
    <button class="tbtn primary" id="btnApply">✅ 写入</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('mainCanvas');
const ctx = canvas.getContext('2d');
const wrap = $('imgWrap');

let img = null, imgW = 0, imgH = 0;
let dispScale = 1, offX = 0, offY = 0;
let textRegions = [];
let selectedIdx = -1;
let editColor = '#ffffff', editFontSize = 24, editFontWeight = 700;
let histStack = [];
const MAX_HIST = 15;

// 离屏高清canvas
let hiC = null, hiX = null;
function initHi() {
  if (!hiC) { hiC = document.createElement('canvas'); hiX = hiC.getContext('2d'); }
  if (img && (hiC.width !== imgW || hiC.height !== imgH)) {
    hiC.width = imgW; hiC.height = imgH;
    hiX.drawImage(img, 0, 0, imgW, imgH);
  }
}

// ===== 上传 =====
$('btnUpload').onclick = () => $('fileInput').click();
$('fileInput').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
document.addEventListener('paste', e => {
  for (const item of (e.clipboardData?.items || []))
    if (item.type.startsWith('image/')) { loadFile(item.getAsFile()); break; }
});

function loadFile(f) {
  const r = new FileReader();
  r.onload = ev => {
    const i = new Image();
    i.onload = () => {
      img = i; imgW = i.naturalWidth; imgH = i.naturalHeight;
      hiC = null; hiX = null; // 重置
      initHi();
      $('uploadMask').style.display = 'none';
      resizeCanvas();
      pushHist();
      runOCR();
    };
    i.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

function resizeCanvas() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  canvas.width = ww; canvas.height = wh;
  canvas.style.width = ww + 'px'; canvas.style.height = wh + 'px';
  dispScale = Math.min(ww / imgW, wh / imgH);
  const dw = imgW * dispScale, dh = imgH * dispScale;
  offX = (ww - dw) / 2; offY = (wh - dh) / 2;
  render();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (hiC) {
    ctx.drawImage(hiC, offX, offY, imgW * dispScale, imgH * dispScale);
  } else if (img) {
    ctx.drawImage(img, offX, offY, imgW * dispScale, imgH * dispScale);
  }
}

// ===== OCR =====
async function runOCR() {
  clearOverlays();
  $('progressBar').style.display = 'block';
  $('progressText').style.display = 'block';
  $('progressText').textContent = '🔍 识别中...';
  $('progressFill').style.width = '0%';

  try {
    const result = await Tesseract.recognize(img, 'chi_sim+eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round((m.progress || 0) * 100);
          $('progressFill').style.width = pct + '%';
          $('progressText').textContent = '🔍 识别中 ' + pct + '%';
        }
      }
    });
    textRegions = [];
    for (const w of (result.data.words || [])) {
      if (!w.text || !w.text.trim()) continue;
      const b = w.bbox;
      textRegions.push({
        text: w.text.trim(),
        x0: b.x0, y0: b.y0, x1: b.x1, y1: b.y1,
        fontSize: Math.round((b.y1 - b.y0) * 1.15),
        color: '#ffffff'
      });
    }
    // 取色
    initHi();
    for (const r of textRegions) r.color = sampleColor(r);

    $('progressBar').style.display = 'none';
    $('progressText').style.display = 'none';
    renderOverlays();
    toast('识别完成，发现 ' + textRegions.length + ' 处文字');
  } catch(e) {
    $('progressBar').style.display = 'none';
    $('progressText').style.display = 'none';
    toast('识别失败，请重试');
    console.error(e);
  }
}

function sampleColor(r) {
  initHi();
  try {
    const cx = Math.round((r.x0 + r.x1) / 2);
    const cy = Math.round((r.y0 + r.y1) / 2);
    const sw = Math.max(1, Math.round((r.x1 - r.x0) * 0.5));
    const sh = Math.max(1, Math.round((r.y1 - r.y0) * 0.5));
    const sx = Math.max(0, cx - Math.round(sw / 2));
    const sy = Math.max(0, cy - Math.round(sh / 2));
    const data = hiX.getImageData(sx, sy, Math.min(sw, imgW - sx), Math.min(sh, imgH - sy)).data;
    // 采样文字颜色：找最不接近背景的像素
    // 先估算背景色（边缘像素）
    let bgR = 0, bgG = 0, bgB = 0, bgN = 0;
    // 再找文字色（最不同的）
    let bestR = 255, bestG = 255, bestB = 255, maxDist = 0;
    const step = 4;
    for (let i = 0; i < data.length; i += step * 4) {
      const pr = data[i], pg = data[i+1], pb = data[i+2], pa = data[i+3];
      if (pa < 128) continue;
      // 累计背景
      bgR += pr; bgG += pg; bgB += pb; bgN++;
    }
    if (bgN > 0) {
      bgR = Math.round(bgR / bgN); bgG = Math.round(bgG / bgN); bgB = Math.round(bgB / bgN);
    }
    for (let i = 0; i < data.length; i += step * 4) {
      const pr = data[i], pg = data[i+1], pb = data[i+2], pa = data[i+3];
      if (pa < 128) continue;
      const dist = Math.abs(pr - bgR) + Math.abs(pg - bgG) + Math.abs(pb - bgB);
      if (dist > maxDist) { maxDist = dist; bestR = pr; bestG = pg; bestB = pb; }
    }
    return '#' + [bestR, bestG, bestB].map(v => Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0')).join('');
  } catch(e) {
    return '#ffffff';
  }
}

// ===== 文字框overlay =====
function renderOverlays() {
  clearOverlays();
  for (let i = 0; i < textRegions.length; i++) {
    const r = textRegions[i];
    const el = document.createElement('div');
    el.className = 'text-overlay';
    el.dataset.idx = i;
    const dx = r.x0 * dispScale + offX;
    const dy = r.y0 * dispScale + offY;
    const dw = (r.x1 - r.x0) * dispScale;
    const dh = (r.y1 - r.y0) * dispScale;
    el.style.cssText = `left:${dx}px;top:${dy}px;width:${dw}px;height:${dh}px`;
    el.innerHTML = `<span class="lbl">${r.text}</span>`;
    el.addEventListener('click', e => { e.stopPropagation(); selectRegion(i); });
    wrap.appendChild(el);
  }
}
function clearOverlays() {
  wrap.querySelectorAll('.text-overlay').forEach(el => el.remove());
}

// ===== 选择编辑 =====
function selectRegion(idx) {
  selectedIdx = idx;
  const r = textRegions[idx];
  editColor = r.color;
  editFontSize = r.fontSize;
  editFontWeight = 700;

  // 高亮选中框
  wrap.querySelectorAll('.text-overlay').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  $('origText').textContent = r.text;
  $('origSize').textContent = r.fontSize + 'px';
  $('origColor').textContent = r.color;
  $('inputText').value = r.text;
  $('fontSizeSlider').value = r.fontSize;
  $('fontSizeVal').textContent = r.fontSize;
  $('fontWeightSlider').value = 700;
  $('fontWeightVal').textContent = '粗';
  setColor(r.color);
  $('editPanel').style.display = 'block';
  $('inputText').focus();
}

// ===== 写入 =====
$('btnApply').onclick = () => {
  if (selectedIdx < 0) return;
  const newText = $('inputText').value;
  if (!newText) { toast('请输入文字'); return; }
  pushHist();
  const r = textRegions[selectedIdx];
  paintOver(r);
  writeNew(r, newText);
  r.text = newText;
  render();
  renderOverlays();
  closeEdit();
  toast('已写入 ✓');
};

function paintOver(r) {
  initHi();
  // 取边缘背景色
  const pad = 4;
  const edges = [];
  const samples = [
    [Math.max(0, r.x0 - pad), r.y0],
    [Math.min(imgW - 1, r.x1 + pad), r.y0],
    [r.x0, Math.max(0, r.y0 - pad)],
    [r.x0, Math.min(imgH - 1, r.y1 + pad)],
  ];
  for (const [sx, sy] of samples) {
    try {
      const p = hiX.getImageData(sx, sy, 1, 1).data;
      edges.push([p[0], p[1], p[2]]);
    } catch(e) {}
  }
  let bgR = 128, bgG = 128, bgB = 128;
  if (edges.length) {
    bgR = Math.round(edges.reduce((s, c) => s + c[0], 0) / edges.length);
    bgG = Math.round(edges.reduce((s, c) => s + c[1], 0) / edges.length);
    bgB = Math.round(edges.reduce((s, c) => s + c[2], 0) / edges.length);
  }
  // 填充背景覆盖原文
  hiX.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
  hiX.fillRect(r.x0 - 2, r.y0 - 1, (r.x1 - r.x0) + 4, (r.y1 - r.y0) + 2);
}

function writeNew(r, text) {
  initHi();
  hiX.save();
  const fs = editFontSize;
  hiX.font = `${editFontWeight} ${fs}px -apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif`;
  hiX.fillStyle = editColor;
  hiX.textBaseline = 'top';
  hiX.fillText(text, r.x0, r.y0 + ((r.y1 - r.y0) - fs) / 2);
  hiX.restore();
}

// 删除原文
$('btnDeleteText').onclick = () => {
  if (selectedIdx < 0) return;
  pushHist();
  paintOver(textRegions[selectedIdx]);
  textRegions.splice(selectedIdx, 1);
  render();
  renderOverlays();
  closeEdit();
  toast('已删除 ✓');
};

// ===== 编辑面板控件 =====
$('fontSizeSlider').oninput = e => { editFontSize = +e.target.value; $('fontSizeVal').textContent = editFontSize; };
$('fontWeightSlider').oninput = e => {
  editFontWeight = +e.target.value;
  const labels = {100:'极细',200:'细',300:'偏细',400:'常规',500:'中',600:'偏粗',700:'粗',800:'特粗',900:'极粗'};
  $('fontWeightVal').textContent = labels[editFontWeight] || '粗';
};
function setColor(hex) { editColor = hex; $('colorPreview').style.background = hex; $('colorPicker').value = hex; }
$('colorPreview').onclick = () => $('colorPicker').click();
$('colorPicker').oninput = e => setColor(e.target.value);
document.querySelectorAll('.cdot').forEach(d => d.onclick = () => setColor(d.dataset.c));
$('btnCancelEdit').onclick = closeEdit;
function closeEdit() { $('editPanel').style.display = 'none'; selectedIdx = -1; wrap.querySelectorAll('.text-overlay').forEach(el => el.classList.remove('active')); }

// 点击空白关闭
canvas.addEventListener('click', closeEdit);

// ===== 历史记录 =====
function pushHist() { initHi(); histStack.push(hiX.getImageData(0, 0, imgW, imgH)); if (histStack.length > MAX_HIST) histStack.shift(); }
$('btnUndo').onclick = () => {
  if (!histStack.length) { toast('没有可撤销的'); return; }
  initHi();
  hiX.putImageData(histStack.pop(), 0, 0);
  render();
  toast('已撤销');
};

// ===== 重识别 =====
$('btnReOCR').onclick = () => {
  if (!hiC) return;
  const tmp = new Image();
  tmp.onload = () => { img = tmp; runOCR(); };
  tmp.src = hiC.toDataURL();
};

// ===== 保存 =====
$('btnSave').onclick = () => {
  if (!hiC) return;
  const a = document.createElement('a');
  a.download = 'P图结果_' + Date.now() + '.png';
  a.href = hiC.toDataURL('image/png');
  a.click();
  toast('已保存 📸');
};

// ===== Toast =====
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.remove('show'); void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== Resize =====
window.addEventListener('resize', () => {
  if (!img) return;
  resizeCanvas();
  if (textRegions.length) renderOverlays();
});
</script>
</body>
</html>
